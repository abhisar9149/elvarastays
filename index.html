<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Homestay</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }
        header {
            background: #2e8b57;
            color: white;
            padding: 20px;
            text-align: center;
        }
        section {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }
        footer {
            text-align: center;
            padding: 10px;
            background: #ddd;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Homestay</h1>
    <p>Peaceful stay in the mountains 🌄</p>
</header>

<section>
    <div class="card">
        <h2>About Us</h2>
        <p>Enjoy a cozy stay with beautiful views, home-cooked meals, and nature.</p>
    </div>

    <div class="card">
        <h2>Rooms</h2>
        <p>Comfortable rooms with all basic amenities.</p>
    </div>

    <div class="card">
        <h2>Contact</h2>
        <p>Phone: 1234567890</p>
        <p>Email: your@email.com</p>
    </div>
</section>

<footer>
    <p>© 2026 My Homestay</p>
</footer>

</body>
</html>
